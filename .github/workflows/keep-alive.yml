name: Keep Services Alive

on:
  schedule:
    # Runs every 2 days at midnight UTC
    - cron: "0 0 */2 * *"
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Ping Supabase database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: node scripts/keep-alive.js

      - name: Ping Render service (wake it up)
        run: |
          echo "Pinging Render service to prevent spin-down..."
          curl --silent --max-time 60 --retry 3 --retry-delay 5 "${{ secrets.RENDER_APP_URL }}" -o /dev/null -w "HTTP Status: %{http_code}\n"
          echo "Render ping complete."
